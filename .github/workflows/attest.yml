name: Attest release build

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            tag:
                description: 'Existing release tag to attest (e.g. 1.0.0)'
                required: true

permissions:
    contents: write
    id-token: write
    attestations: write

jobs:
    attest:
        runs-on: ubuntu-latest
        env:
            TAG: ${{ github.event.inputs.tag || github.ref_name }}
        steps:
            - uses: actions/checkout@v6
              with:
                  ref: ${{ github.event.inputs.tag || github.ref_name }}
            - uses: actions/setup-node@v6
              with:
                  node-version: 25.x
                  cache: 'npm'
            - run: npm ci
            - run: npm run build

            - name: Attest build provenance for the release assets
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: |
                      main.js
                      styles.css
                      manifest.json

            - name: Upload attested assets to the release
              env:
                  GH_TOKEN: ${{ github.token }}
              run: gh release upload "${TAG}" main.js styles.css manifest.json --clobber
